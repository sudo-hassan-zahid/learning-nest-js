version: '3.8'
services:
  db:
    image: postgres:15
    container_name: nest_psql
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestdb
    ports:
      - "5460:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: